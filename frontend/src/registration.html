<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Season Parking Registration</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="page">
        <nav class="navbar">
            <div class="container">
                <div class="logo" onclick="window.location.href='index.html'" style="cursor:pointer;">
                    <span class="logo-text">Hi<span class="logo-highlight">speedcity</span></span>
                </div>
            </div>
        </nav>

        <div class="container">
            <div class="form-container">
                <div class="form-header">
                    <h1 data-testid="registration-form-title">Season Parking Registration Form</h1>
                    <p class="form-note">(Update will be within 48 hours)</p>
                </div>

                <form id="registrationForm" data-testid="registration-form">
                    <div class="form-section">
                        <h2>Personal Information</h2>
                        <div class="form-row">
                            <div class="form-group full-width">
                                <label for="fullName">Full Name *</label>
                                <input type="text" id="fullName" name="fullName" required data-testid="full-name-input">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="phoneNumber">Phone Number *</label>
                                <input type="tel" id="phoneNumber" name="phoneNumber" required data-testid="phone-input">
                            </div>
                            <div class="form-group">
                                <label for="companyName">Company Name *</label>
                                <input type="text" id="companyName" name="companyName" required data-testid="company-input">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="staffId">Staff ID *</label>
                                <input type="text" id="staffId" name="staffId" required data-testid="staff-id-input">
                            </div>
                        </div>
                    </div>

                    <div class="form-section">
                        <h2>Vehicle Information</h2>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="vehicleNumber">Vehicle Number *</label>
                                <input type="text" id="vehicleNumber" name="vehicleNumber" required data-testid="vehicle-number-input" placeholder="e.g., ABC 1234">
                            </div>
                            <div class="form-group">
                                <label for="vehicleModel">Vehicle Model *</label>
                                <input type="text" id="vehicleModel" name="vehicleModel" required data-testid="vehicle-model-input" placeholder="e.g., Toyota Camry">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Vehicle Type *</label>
                                <div class="radio-group">
                                    <label class="radio-label">
                                        <input type="radio" name="vehicleType" value="Sedan" required data-testid="vehicle-type-sedan">
                                        <span>Sedan</span>
                                    </label>
                                    <label class="radio-label">
                                        <input type="radio" name="vehicleType" value="Hatchback" data-testid="vehicle-type-hatchback">
                                        <span>Hatchback</span>
                                    </label>
                                    <label class="radio-label">
                                        <input type="radio" name="vehicleType" value="SUV" data-testid="vehicle-type-suv">
                                        <span>SUV</span>
                                    </label>
                                    <label class="radio-label">
                                        <input type="radio" name="vehicleType" value="Mini Van" data-testid="vehicle-type-minivan">
                                        <span>Mini Van</span>
                                    </label>
                                    <label class="radio-label">
                                        <input type="radio" name="vehicleType" value="Others" data-testid="vehicle-type-others">
                                        <span>Others</span>
                                    </label>
                                </div>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="vehicleColor">Vehicle Color *</label>
                                <input type="text" id="vehicleColor" name="vehicleColor" required data-testid="vehicle-color-input">
                            </div>
                        </div>
                    </div>

                    <div class="form-section">
                        <h2>Parking Subscription</h2>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Parking Type *</label>
                                <div class="radio-group">
                                    <label class="radio-label">
                                        <input type="radio" name="parkingType" value="Non Reserved" data-price="150" required data-testid="parking-type-non-reserved">
                                        <span>Non Reserved (RM150)</span>
                                    </label>
                                    <label class="radio-label">
                                        <input type="radio" name="parkingType" value="Reserved" data-price="200" data-testid="parking-type-reserved">
                                        <span>Reserved (RM200)</span>
                                    </label>
                                    <label class="radio-label">
                                        <input type="radio" name="parkingType" value="Premium" data-price="300" data-testid="parking-type-premium">
                                        <span>Premium (RM300)</span>
                                    </label>
                                </div>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Subscription Period *</label>
                                <div class="radio-group">
                                    <label class="radio-label">
                                        <input type="radio" name="subscriptionPeriod" value="Monthly" data-multiplier="1" required data-testid="subscription-monthly">
                                        <span>Monthly</span>
                                    </label>
                                    <label class="radio-label">
                                        <input type="radio" name="subscriptionPeriod" value="Quarterly" data-multiplier="3" data-testid="subscription-quarterly">
                                        <span>Quarterly</span>
                                    </label>
                                    <label class="radio-label">
                                        <input type="radio" name="subscriptionPeriod" value="Yearly" data-multiplier="12" data-testid="subscription-yearly">
                                        <span>Yearly</span>
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" onclick="window.location.href='index.html'" data-testid="back-btn">Back to Home</button>
                        <button type="submit" class="btn btn-primary" data-testid="next-btn">Next</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="registration.js"></script>
</body>
</html>
