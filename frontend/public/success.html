<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Submitted</title>
    <link rel="preload" href="styles.css" as="style">
    <link rel="stylesheet" href="styles.css">
    <style>html,body{background:#F5F5F5;margin:0;padding:0;}input:invalid,input:required{box-shadow:none!important;outline:none!important;}</style>
</head>
<body>
    <div class="page">
        <nav class="navbar">
            <div class="container">
                <div class="logo" onclick="window.location.href='index.html'" style="cursor:pointer;">
                    <span class="logo-text">Hi<span class="logo-highlight">speedcity</span></span>
                </div>
            </div>
        </nav>

        <div class="container">
            <div class="success-container">
                <div class="success-icon" data-testid="success-icon">✓</div>
                <h1 data-testid="success-title">Application Submitted Successfully</h1>
                <div class="success-details">
                    <div class="success-item">
                        <span class="success-label">Application Type:</span>
                        <span class="success-value" id="applicationTypeValue" data-testid="success-app-type"></span>
                    </div>
                    <div class="success-item">
                        <span class="success-label">Reference Number:</span>
                        <span class="success-value" id="referenceNumber" data-testid="reference-number"></span>
                    </div>
                    <div class="success-item">
                        <span class="success-label">Status:</span>
                        <span class="status-badge pending" data-testid="status-badge">Pending Verification</span>
                    </div>
                    <div class="success-item">
                        <span class="success-label">Submission Date:</span>
                        <span class="success-value" id="submissionDate" data-testid="submission-date"></span>
                    </div>
                    <div class="success-item">
                        <span class="success-label">Submission Time:</span>
                        <span class="success-value" id="submissionTime" data-testid="submission-time"></span>
                    </div>
                </div>
                <p class="success-message" id="successMessage" data-testid="success-message">Your application has been received and is currently under review. You will be notified within 48 hours.</p>
                <div class="form-actions" style="justify-content:center;gap:12px;flex-wrap:wrap;">
                    <button class="btn btn-secondary" id="downloadFormBtn" data-testid="download-form-btn">Download Submission Form</button>
                    <button class="btn btn-primary" onclick="returnHome()" data-testid="return-home-btn">Return to Home</button>
                </div>
            </div>
        </div>
    </div>

    <script src="pdf-utils.js"></script>
    <script src="success.js"></script>
</body>
</html>
