<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link rel="preload" href="styles.css" as="style">
    <link rel="stylesheet" href="styles.css">
    <style>html,body{background:#F5F5F5;margin:0;padding:0;}input:invalid,input:required{box-shadow:none!important;outline:none!important;}</style>
</head>
<body>
    <div class="page">
        <nav class="navbar">
            <div class="container">
                <div class="logo" onclick="window.location.href='index.html'" style="cursor:pointer;">
                    <span class="logo-text">Hi<span class="logo-highlight">speedcity</span></span>
                </div>
            </div>
        </nav>

        <div class="container">
            <div class="login-container">
                <div class="login-box">
                    <h1 data-testid="admin-login-title">Admin Login</h1>
                    <p class="login-subtitle">Access the management dashboard</p>
                    <form id="loginForm" data-testid="login-form">
                        <div class="form-group">
                            <label for="username">Username</label>
                            <input type="text" id="username" name="username" required data-testid="username-input">
                        </div>
                        <div class="form-group">
                            <label for="password">Password</label>
                            <input type="password" id="password" name="password" required data-testid="password-input">
                        </div>
                        <button type="submit" class="btn btn-primary btn-block" data-testid="login-btn">Login</button>
                    </form>
                    <p class="login-note">For prototype: Any credentials will work</p>
                </div>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script src="admin-login.js"></script>
</body>
</html>
