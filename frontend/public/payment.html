<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment</title>
    <link rel="preload" href="styles.css" as="style">
    <link rel="stylesheet" href="styles.css">
    <style>html,body{background:#F5F5F5;margin:0;padding:0;}input:invalid,input:required{box-shadow:none!important;outline:none!important;}</style>
</head>
<body>
    <div class="page">
        <nav class="navbar">
            <div class="container">
                <div class="logo" onclick="window.location.href='index.html'" style="cursor:pointer;">
                    <span class="logo-text">Hi<span class="logo-highlight">speedcity</span></span>
                </div>
            </div>
        </nav>

        <div class="container">
            <div class="form-container">
                <div class="form-header">
                    <h1 data-testid="payment-title">Payment</h1>
                    <p class="form-note">Complete your payment to finalize registration</p>
                </div>

                <div class="payment-container">
                    <div class="payment-info">
                        <div class="amount-display" data-testid="payment-amount">
                            <span class="amount-label">Total Amount:</span>
                            <span class="amount-value" id="paymentAmount"></span>
                        </div>
                    </div>

                    <div class="qr-section">
                        <h2>Scan QR Code to Pay</h2>
                        <div class="qr-code" data-testid="qr-code">
                            <img src="https://customer-assets.emergentagent.com/job_smart-parking-reg/artifacts/s7fu0xpl_WhatsApp%20Image%202026-05-20%20at%2012.39.48.jpg" alt="DuitNow QR Code" style="max-width: 300px; width: 100%; height: auto; display: block;">
                        </div>
                        <p class="qr-instruction">Scan the DuitNow QR Code and complete payment</p>
                    </div>

                    <div class="upload-section">
                        <h2>Upload Payment Receipt</h2>
                        <div class="upload-area" id="uploadArea" data-testid="upload-area">
                            <input type="file" id="receiptUpload" accept="image/*,application/pdf" style="display:none;" data-testid="receipt-upload-input">
                            <div class="upload-placeholder" id="uploadPlaceholder">
                                <div class="upload-icon">📤</div>
                                <p>Click to upload payment receipt</p>
                                <p class="upload-note">Accepted: JPG, PNG, PDF (Max 5MB)</p>
                            </div>
                            <div class="upload-preview" id="uploadPreview" style="display:none;">
                                <img id="previewImage" alt="Receipt preview">
                                <button type="button" class="btn-remove" id="removeImage" data-testid="remove-receipt-btn">Remove</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="window.location.href='review.html'" data-testid="back-btn">Back</button>
                    <button type="button" class="btn btn-primary" id="submitBtn" data-testid="submit-btn">Submit Application</button>
                </div>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script src="payment.js"></script>
</body>
</html>
