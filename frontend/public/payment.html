<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="page">
        <nav class="navbar">
            <div class="container">
                <div class="logo" onclick="window.location.href='index.html'" style="cursor:pointer;">
                    <span class="logo-text">Hi<span class="logo-highlight">speedcity</span></span>
                </div>
            </div>
        </nav>

        <div class="container">
            <div class="form-container">
                <div class="form-header">
                    <h1 data-testid="payment-title">Payment</h1>
                    <p class="form-note">Complete your payment to finalize registration</p>
                </div>

                <div class="payment-container">
                    <div class="payment-info">
                        <div class="amount-display" data-testid="payment-amount">
                            <span class="amount-label">Total Amount:</span>
                            <span class="amount-value" id="paymentAmount"></span>
                        </div>
                    </div>

                    <div class="qr-section">
                        <h2>Scan QR Code to Pay</h2>
                        <div class="qr-code" data-testid="qr-code">
                            <svg width="200" height="200" viewBox="0 0 200 200">
                                <rect width="200" height="200" fill="white"/>
                                <rect x="10" y="10" width="60" height="60" fill="black"/>
                                <rect x="20" y="20" width="40" height="40" fill="white"/>
                                <rect x="130" y="10" width="60" height="60" fill="black"/>
                                <rect x="140" y="20" width="40" height="40" fill="white"/>
                                <rect x="10" y="130" width="60" height="60" fill="black"/>
                                <rect x="20" y="140" width="40" height="40" fill="white"/>
                                <rect x="80" y="20" width="10" height="10" fill="black"/>
                                <rect x="100" y="20" width="10" height="10" fill="black"/>
                                <rect x="90" y="40" width="10" height="10" fill="black"/>
                                <rect x="110" y="40" width="10" height="10" fill="black"/>
                                <rect x="80" y="60" width="10" height="10" fill="black"/>
                                <rect x="100" y="60" width="10" height="10" fill="black"/>
                                <rect x="90" y="80" width="30" height="30" fill="black"/>
                                <rect x="95" y="85" width="20" height="20" fill="white"/>
                                <rect x="130" y="80" width="10" height="10" fill="black"/>
                                <rect x="150" y="80" width="10" height="10" fill="black"/>
                                <rect x="170" y="80" width="10" height="10" fill="black"/>
                                <rect x="80" y="130" width="10" height="10" fill="black"/>
                                <rect x="100" y="130" width="10" height="10" fill="black"/>
                                <rect x="130" y="130" width="60" height="60" fill="black"/>
                                <rect x="140" y="140" width="40" height="40" fill="white"/>
                                <rect x="150" y="150" width="20" height="20" fill="black"/>
                            </svg>
                        </div>
                        <p class="qr-instruction">Scan the QR Code and complete payment</p>
                    </div>

                    <div class="upload-section">
                        <h2>Upload Payment Receipt</h2>
                        <div class="upload-area" id="uploadArea" data-testid="upload-area">
                            <input type="file" id="receiptUpload" accept="image/*" style="display:none;" data-testid="receipt-upload-input">
                            <div class="upload-placeholder" id="uploadPlaceholder">
                                <div class="upload-icon">📤</div>
                                <p>Click to upload payment receipt</p>
                                <p class="upload-note">Accepted: JPG, PNG (Max 5MB)</p>
                            </div>
                            <div class="upload-preview" id="uploadPreview" style="display:none;">
                                <img id="previewImage" alt="Receipt preview">
                                <button type="button" class="btn-remove" id="removeImage" data-testid="remove-receipt-btn">Remove</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="window.location.href='review.html'" data-testid="back-btn">Back</button>
                    <button type="button" class="btn btn-primary" id="submitBtn" data-testid="submit-btn">Submit Application</button>
                </div>
            </div>
        </div>
    </div>

    <script src="payment.js"></script>
</body>
</html>
